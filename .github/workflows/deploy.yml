name: Deploy to EC2

# Auto-deploy on every push to main. Can also be run manually from the
# Actions tab via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys if two pushes land close together.
concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Runs directly on the staging EC2 box (self-hosted runner registered
    # there with the "staging" label) — no SSH hop needed.
    runs-on: [self-hosted, staging]
    steps:
      - name: Deploy
        run: |
          set -e
          cd ~/iphouse_latest
          git fetch origin main
          git reset --hard origin/main      # deterministic; never conflicts
          docker compose up -d --build
          docker image prune -f             # reclaim space from old images
